name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install poetry
        run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Install dependencies
        run: poetry install
      - name: Check formatting (black)
        run: poetry run black --check src/ tests/
      - name: Lint (ruff)
        run: poetry run ruff check src/ tests/

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install poetry
        run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Install dependencies
        run: poetry install
      - name: Run tests (unit, integration, regression)
        run: poetry run pytest tests/

  docs:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install poetry
        run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Install dependencies
        run: poetry install
      - name: Build docs (warnings are errors)
        run: poetry run sphinx-build -W docs docs/build/html
